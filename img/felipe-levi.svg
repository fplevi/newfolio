  <line x1="0" y1="360" x2="600" y2="360" stroke="#E2E2E2" stroke-width="1"/>
  <!-- Corner marks -->
  <polyline points="24,48 24,24 48,24" fill="none" stroke="#CCCCCC" stroke-width="1.5"/>
  <polyline points="576,48 576,24 552,24" fill="none" stroke="#CCCCCC" stroke-width="1.5"/>
  <polyline points="24,672 24,696 48,696" fill="none" stroke="#CCCCCC" stroke-width="1.5"/>
  <polyline points="576,672 576,696 552,696" fill="none" stroke="#CCCCCC" stroke-width="1.5"/>
  <!-- Person silhouette - head -->
  <circle cx="300" cy="272" r="72" fill="#D4D4D4"/>
